name: autoupdate

on:
  schedule:
    - cron: "0 18 * * *"          # 北京时间次日 02:00
  workflow_dispatch:

permissions:
  contents: write

# 防止新旧任务同时运行导致提交冲突
concurrency:
  group: autoupdate
  cancel-in-progress: true

jobs:
  autoupdate_python:
    runs-on: ubuntu-latest
    timeout-minutes: 10           # 防止上游卡死导致长时间挂起

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/workflows/python/requirements.txt'

      - name: Install dependencies
        run: pip install -r .github/workflows/python/requirements.txt

      - name: Run all update scripts (parallel)
        run: |
          python .github/workflows/python/chnroutes2.py &
          python .github/workflows/python/chn-operator-ip.py &
          python .github/workflows/python/gfw.py &
          python .github/workflows/python/cndomain.py &
          wait                              # 任一子进程失败都会导致步骤失败

      - name: Verify output files are non-empty
        run: |
          for f in autoupdate/*.yaml; do
            if [ ! -s "$f" ]; then
              echo "❌ $f is empty or missing" >&2
              exit 1
            fi
          done

      - name: Commit and push changes
        env:
          TZ: Asia/Shanghai
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [[ $(git status --porcelain autoupdate/*.yaml) ]]; then
            git add autoupdate/*.yaml
            git commit -m "Update rules: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit."
          fi